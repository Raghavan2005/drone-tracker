model:
  num_classes: 5
  input_size: 416

data:
  train_images: "data/images/train"
  train_labels: "data/labels/train"
  val_images: "data/images/val"
  val_labels: "data/labels/val"
  class_names: ["drone_small", "drone_medium", "drone_large", "bird", "aircraft"]

training:
  epochs: 300
  batch_size: 64
  base_lr: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  min_lr: 0.00001
  fp16: true
  ema_decay: 0.9999
  val_interval: 5
  save_interval: 10

augmentation:
  mosaic_prob: 0.8
  mixup_prob: 0.1
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  flip_lr: 0.5
  scale: [0.5, 1.5]

loss:
  obj_weight: 1.0
  cls_weight: 0.5
  reg_weight: 5.0

output:
  save_dir: "runs/train"
  tensorboard: true
